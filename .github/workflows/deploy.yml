name: Build and Push Frontend to GHCR

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase the repo name
        run: echo "IMAGE_ID=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_ID }}:latest
          build-args: |
            AUTH_KEYCLOAK_ISSUER=https://auth.terkep.party/realms/party-map
            AUTH_KEYCLOAK_ID=partymap
            NEXT_PUBLIC_URL_BASE=https://terkep.party
            NEXT_PUBLIC_RESOURCE_API_BASE_URL=https://api.terkep.party
            NEXT_PUBLIC_AUTH_KEYCLOAK_ISSUER=https://auth.terkep.party/realms/party-map
            NEXT_PUBLIC_AUTH_KEYCLOAK_ID=partymap